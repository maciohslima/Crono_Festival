<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Festival de Quadrilhas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body class="show-menu"> <!-- Inicia visível para configuração inicial -->

    <!-- Zona de detecção no topo -->
    <div id="hover-trigger" onmouseenter="showUI()"></div>

    <!-- O painel agora tem onmouseleave para fechar quando o mouse sair dele -->
    <header id="control-layer" onmouseleave="hideUI()">
        <div class="input-row">
            <div class="input-group">
                <label>Produção</label>
                <input type="number" id="cfg-producao" value="12">
            </div>
            <div class="input-group">
                <label>Apresentação</label>
                <input type="number" id="cfg-apresentacao" value="45">
            </div>
            <div class="input-group">
                <label>Limpeza</label>
                <input type="number" id="cfg-limpeza" value="10">
            </div>
            <div class="input-group">
                <label>Carregar Arte</label>
                <input type="file" id="art-upload" accept="image/*" onchange="handleArtUpload(event)">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-go" onclick="initTimer('PRODUÇÃO')">Produção</button>
            <button class="btn-go" onclick="initTimer('APRESENTAÇÃO')">Apresentação</button>
            <button class="btn-go" onclick="initTimer('LIMPEZA')">Limpeza</button>
            <button class="btn-fs" onclick="toggleFS()">Tela Cheia</button>
            <button class="btn-stop" onclick="stopAll()">Resetar (ESC)</button>
        </div>
    </header>

    <div id="viewport-container">
        <div id="art-overlay"></div>
        <main id="display-layer">
            <h2 id="status-header">PRONTO</h2>
            <div id="main-timer">00:00</div>
            <div id="overtime-label">⚠️ TEMPO EXCEDIDO ⚠️</div>
        </main>
    </div>

    <script src="script.js"></script>
</body>

</html>

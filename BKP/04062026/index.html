<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cronômetro Festival de Quadrilhas</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div id="bg-image-layer"></div>

    <main id="display-layer">
        <h2 id="status-header">PRONTO</h2>
        <div id="main-timer">00:00</div>
        <div id="overtime-label">⚠️ TEMPO EXCEDIDO ⚠️</div>
    </main>

    <div id="hover-trigger" onmouseover="showUI()"></div>

    <footer id="control-layer" onmouseleave="hideUI()">
        <div class="input-row">
            <div class="input-group">
                <label>Produção</label>
                <input type="number" id="cfg-producao" value="12">
            </div>
            <div class="input-group">
                <label>Apresentação</label>
                <input type="number" id="cfg-apresentacao" value="45">
            </div>
            <div class="input-group">
                <label>Limpeza</label>
                <input type="number" id="cfg-limpeza" value="10">
            </div>
            <div class="input-group">
                <label>Imagem de Fundo</label>
                <label for="image-uploader" class="btn-upload-label">Selecionar...</label>
                <input type="file" id="image-uploader" accept="image/*" onchange="changeBackgroundImage(event)">
            </div>
        </div>
        <div class="btn-row">
            <button class="btn-go" onclick="initTimer('PRODUÇÃO')">Produção</button>
            <button class="btn-go" onclick="initTimer('APRESENTAÇÃO')">Apresentação</button>
            <button class="btn-go" onclick="initTimer('LIMPEZA')">Limpeza</button>
            <button class="btn-fs" onclick="toggleFS()">Tela Cheia</button>
            <button class="btn-stop" onclick="stopAll()">Resetar (ESC)</button>
        </div>
    </footer>

    <script src="script.js"></script>
</body>

</html>
